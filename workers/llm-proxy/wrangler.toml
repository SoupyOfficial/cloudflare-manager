name = "llm-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "b6ccd531a511f0021fa8d90c29cd5a3e"
workers_dev = true

# ─── Environment Variables ────────────────────────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://apps.madebysoupy.dev,https://plot-generator.madebysoupy.dev"

# ─── Production Route ────────────────────────────────────────────────────────
[[routes]]
pattern = "llm-api.madebysoupy.dev/*"
zone_name = "madebysoupy.dev"

# ─── Secrets (set via `wrangler secret put`, do NOT commit values) ────────────
# LLM_HOST_CLIENT_ID
# LLM_HOST_CLIENT_SECRET
# OPENAI_API_KEY
# CLAUDE_API_KEY

# ─── Test Environment ─────────────────────────────────────────────────────────
[env.test]
name = "llm-api-test"
workers_dev = true

[[env.test.routes]]
pattern = "test-llm-api.madebysoupy.dev/*"
zone_name = "madebysoupy.dev"

[env.test.vars]
ALLOWED_ORIGINS = "https://test-apps.madebysoupy.dev,https://test-plots.madebysoupy.dev"

# ─── Test Secrets (set via `wrangler secret put --env test`, do NOT commit values) ────
# LLM_HOST_CLIENT_ID
# LLM_HOST_CLIENT_SECRET
# OPENAI_API_KEY
# CLAUDE_API_KEY
