# Tunnel: ollama-home
# Purpose: Exposes local Ollama LLM service
# Machines: Windows PC (primary), Mac Mini (secondary)
# Note: OpenCode is served by a SEPARATE tunnel (475f52fb) via opencode-config.yml

tunnel:
  name: ollama-home
  id: "7ee20289-1222-4023-89af-d3b688005abb"
  credentials_file_ref: "secrets/ollama-home-creds.json"  # Reference, not actual file

ingress:
  - hostname: llm.madebysoupy.dev
    service: http://localhost:11434
    machine: windows-pc  # or mac-mini
    origin_request:
      connectTimeout: 30s
      tlsTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveTimeout: 90s
      httpHostHeader: localhost:11434
    access_policy: cloudflare-access

  - service: http_status:404

notes:
  - "Only one machine should run this tunnel at a time"
  - "Use stop-tunnel before switching machines"
  - "OpenCode (opencode-origin + opencode-ws) is served by tunnel 475f52fb via opencode-config.yml"
  - "OpenCode public hostname (opencode.madebysoupy.dev) is protected by site-auth worker"
