# Tunnel: ollama-home
# Purpose: Exposes Ollama LLM + OpenCode web UI from Mac Mini
# Machines: Mac Mini (primary for this tunnel)
# Note: OpenCode on Windows uses a SEPARATE tunnel (475f52fb) via opencode-config.yml

tunnel:
  name: ollama-home
  id: "7ee20289-1222-4023-89af-d3b688005abb"
  credentials_file_ref: "secrets/ollama-home-creds.json"  # Reference, not actual file

ingress:
  - hostname: llm.madebysoupy.dev
    service: http://localhost:11434
    machine: mac-mini
    origin_request:
      connectTimeout: 30s
      tlsTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveTimeout: 90s
      httpHostHeader: localhost:11434
    access_policy: cloudflare-access

  - hostname: mac.opencode.madebysoupy.dev
    service: http://localhost:4096
    machine: mac-mini
    origin_request:
      connectTimeout: 30s
      tlsTimeout: 30s
      tcpKeepAlive: 30s
      keepAliveTimeout: 90s
      httpHostHeader: localhost:4096
    access_policy: cloudflare-access

  - service: http_status:404

notes:
  - "Mac Mini only — runs both Ollama (llm.) and OpenCode (mac.opencode.)"
  - "OpenCode on Windows uses a separate tunnel (475f52fb) for opencode.madebysoupy.dev"
  - "mac.opencode. CORS: opencode service launches with --cors https://opencode.madebysoupy.dev (see opencode-manager)"
  - "mac.opencode.madebysoupy.dev is active via the ollama-home tunnel and local cloudflared config"
