name: Health Check

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  health-check:
    name: Check All Endpoints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check plots.madebysoupy.dev
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: HealthCheckBot/1.0" \
            https://plots.madebysoupy.dev/)
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "✅ plots.madebysoupy.dev - Status: $status"
          else
            echo "⚠️ plots.madebysoupy.dev - Status: $status (may require auth / edge policy)"
          fi

      - name: Check opencode.madebysoupy.dev
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: HealthCheckBot/1.0" \
            https://opencode.madebysoupy.dev/)
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "✅ opencode.madebysoupy.dev - Status: $status"
          else
            echo "⚠️ opencode.madebysoupy.dev - Status: $status (may require auth)"
          fi

      - name: Check telemetry.madebysoupy.dev
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: HealthCheckBot/1.0" \
            https://telemetry.madebysoupy.dev/events)
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "✅ telemetry.madebysoupy.dev - Status: $status"
          else
            echo "⚠️ telemetry.madebysoupy.dev - Status: $status"
          fi

      - name: Check llm-api worker
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "User-Agent: HealthCheckBot/1.0" \
            https://llm-api.jscampbell21.workers.dev/)
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "✅ llm-api worker - Status: $status"
          else
            echo "⚠️ llm-api worker - Status: $status"
          fi

      - name: Health check summary
        if: always()
        run: |
          echo "## Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run at: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| plots.madebysoupy.dev | Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| opencode.madebysoupy.dev | Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| telemetry.madebysoupy.dev | Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| llm-api worker | Checked |" >> $GITHUB_STEP_SUMMARY
