name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - site-auth
          - llm-proxy
          - telemetry

jobs:
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy site-auth
        if: >
          github.event_name == 'push' ||
          github.event.inputs.worker == 'site-auth' ||
          github.event.inputs.worker == 'all' ||
          (github.event_name == 'workflow_dispatch' && !github.event.inputs.worker)
        working-directory: workers/site-auth
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy llm-proxy
        if: >
          github.event_name == 'push' ||
          github.event.inputs.worker == 'llm-proxy' ||
          github.event.inputs.worker == 'all' ||
          (github.event_name == 'workflow_dispatch' && !github.event.inputs.worker)
        working-directory: workers/llm-proxy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy telemetry
        if: >
          github.event_name == 'push' ||
          github.event.inputs.worker == 'telemetry' ||
          github.event.inputs.worker == 'all' ||
          (github.event_name == 'workflow_dispatch' && !github.event.inputs.worker)
        working-directory: workers/telemetry
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deployment summary
        if: always()
        run: |
          echo "## Worker Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.worker }}" ]; then
            echo "Requested worker: ${{ github.event.inputs.worker }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | Deployed? |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          WORKER_INPUT="${{ github.event.inputs.worker }}"
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = 'push' ] || [ -z "$WORKER_INPUT" ] || [ "$WORKER_INPUT" = 'all' ] || [ "$WORKER_INPUT" = 'site-auth' ]; then
            echo "| site-auth | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| site-auth | ⏭ skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$EVENT" = 'push' ] || [ -z "$WORKER_INPUT" ] || [ "$WORKER_INPUT" = 'all' ] || [ "$WORKER_INPUT" = 'llm-proxy' ]; then
            echo "| llm-proxy | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| llm-proxy | ⏭ skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$EVENT" = 'push' ] || [ -z "$WORKER_INPUT" ] || [ "$WORKER_INPUT" = 'all' ] || [ "$WORKER_INPUT" = 'telemetry' ]; then
            echo "| telemetry | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| telemetry | ⏭ skipped |" >> $GITHUB_STEP_SUMMARY
          fi
