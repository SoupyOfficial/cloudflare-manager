name: Sync Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/sync-infra.yml"
  workflow_dispatch:
    inputs:
      resource:
        description: "Resource to sync"
        required: false
        type: choice
        options:
          - all
          - dns
          - access
          - firewall

jobs:
  sync-dns:
    name: Sync DNS
    if: ${{ github.event.inputs.resource == 'all' || github.event.inputs.resource == 'dns' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync DNS records
        shell: pwsh
        run: pwsh scripts/sync-dns.ps1
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}

  sync-access:
    name: Sync Access Policies
    if: ${{ github.event.inputs.resource == 'all' || github.event.inputs.resource == 'access' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Access applications
        shell: pwsh
        run: pwsh scripts/sync-access.ps1
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  sync-firewall:
    name: Sync Firewall Rules
    if: ${{ github.event.inputs.resource == 'all' || github.event.inputs.resource == 'firewall' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync firewall rules
        shell: pwsh
        run: pwsh scripts/sync-firewall.ps1
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
